<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion des étudiants</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 14px; border: 1px solid #ddd; text-align: left; }
    th { background: #f5f5f5; }
    a.btn { padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-edit    { background: #f59e0b; color: #fff; }
    .btn-delete  { background: #ef4444; color: #fff; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .admin    { background: #dbeafe; color: #1e40af; }
    .etudiant { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <h1>👥 Gestion des utilisateurs</h1>
  <a class="btn btn-primary" href="{% url 'html_create' %}">+ Nouvel utilisateur</a>
  <br><br>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Nom complet</th>
        <th>Email</th>
        <th>Note</th>
        <th>Rôle</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for u in utilisateurs %}
      <tr>
        <td>{{ u.pk }}</td>
        <td><a href="{% url 'html_detail' u.pk %}">{{ u }}</a></td>
        <td>{{ u.email }}</td>
        <td>{{ u.note|default:"—" }}</td>
        <td><span class="badge {{ u.role }}">{{ u.get_role_display }}</span></td>
        <td>
          <a class="btn btn-edit"   href="{% url 'html_update' u.pk %}">Modifier</a>
          <a class="btn btn-delete" href="{% url 'html_delete' u.pk %}">Supprimer</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="6" style="text-align:center;color:#999;">Aucun utilisateur.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
