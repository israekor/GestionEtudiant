<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Supprimer</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
  .box { border: 1px solid #fca5a5; background: #fef2f2; border-radius: 8px; padding: 24px; }
  .btn-confirm { background: #ef4444; color: #fff; border: none; padding: 10px 20px;
                 border-radius: 6px; cursor: pointer; font-size: 14px; }
  .btn-cancel  { color: #666; text-decoration: none; margin-left: 12px; font-size: 14px; }
</style>
</head>
<body>
  <h1>Supprimer un utilisateur</h1>
  <div class="box">
    <p>Confirmer la suppression de <strong>{{ utilisateur }}</strong> ?</p>
    <p style="color:#999;font-size:13px;">Cette action est irréversible.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-confirm">Oui, supprimer</button>
      <a class="btn-cancel" href="{% url 'html_list' %}">Annuler</a>
    </form>
  </div>
</body>
</html>
