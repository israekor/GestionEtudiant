<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>{{ title }}</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
  label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: 500; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
                  box-sizing: border-box; margin-bottom: 16px; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: #2563eb; }
  .btn-submit { background: #2563eb; color: #fff; border: none; padding: 10px 20px;
                border-radius: 6px; cursor: pointer; font-size: 14px; }
  .btn-cancel { color: #666; text-decoration: none; margin-left: 12px; font-size: 14px; }
  .errorlist { color: #ef4444; font-size: 13px; margin: -12px 0 8px; padding: 0; list-style: none; }
</style>
</head>
<body>
  <h1>{{ title }}</h1>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
    {% endfor %}
    <button type="submit" class="btn-submit">Enregistrer</button>
    <a class="btn-cancel" href="{% url 'html_list' %}">Annuler</a>
  </form>
</body>
</html>
