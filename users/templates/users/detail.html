<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>{{ utilisateur }}</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 24px; }
  .field { margin-bottom: 12px; }
  .label { font-size: 12px; color: #888; text-transform: uppercase; }
  .value { font-size: 16px; margin-top: 2px; }
  a.btn { padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; }
  .btn-edit   { background: #f59e0b; color: #fff; }
  .btn-back   { background: #e5e7eb; color: #333; }
</style>
</head>
<body>
  <h1>{{ utilisateur }}</h1>
  <div class="card">
    <div class="field"><div class="label">Email</div><div class="value">{{ utilisateur.email }}</div></div>
    <div class="field"><div class="label">Note</div><div class="value">{{ utilisateur.note|default:"Non renseignée" }}</div></div>
    <div class="field"><div class="label">Rôle</div><div class="value">{{ utilisateur.get_role_display }}</div></div>
    <div class="field"><div class="label">Créé le</div><div class="value">{{ utilisateur.created_at|date:"d/m/Y H:i" }}</div></div>
  </div>
  <br>
  <a class="btn btn-back" href="{% url 'html_list' %}">← Retour</a>
  <a class="btn btn-edit" href="{% url 'html_update' utilisateur.pk %}">Modifier</a>
</body>
</html>
