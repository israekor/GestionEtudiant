{% extends 'base.html' %} 
{% block title %}{{ titre }}{% endblock %} 
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-dark text-white">
        <h5 class="mb-0">{{ titre }}</h5>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Titre</label>
            <input
              type="text"
              name="titre"
              class="form-control"
              value="{{ formation.titre|default:'' }}"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Durée (heures)</label>
            <input
              type="number"
              name="duree"
              class="form-control"
              value="{{ formation.duree|default:'' }}"
              required
            />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Prix (MAD)</label>
            <input
              type="number"
              step="0.01"
              name="prix"
              class="form-control"
              value="{{ formation.prix|default:'' }}"
              required
            />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success px-4">
              Enregistrer
            </button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary px-4"
              >Annuler</a
            >
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
