{% extends 'base.html' %} 
{% block title %}Inscription - {{ formation.titre }}{% endblock %} 
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h3 class="mb-3">Inscription : {{ formation.titre }}</h3>
    <div class="alert alert-info">
      <strong>Durée :</strong> {{ formation.duree }}h &nbsp;|&nbsp;
      <strong>Prix :</strong> {{ formation.prix }} MAD
    </div>
    <div class="card shadow">
      <div class="card-header bg-dark text-white">Votre Profil</div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom</label>
            <input
              type="text"
              name="nom"
              class="form-control"
              value="{{ etudiant.nom|default:'' }}"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Prénom</label>
            <input
              type="text"
              name="prenom"
              class="form-control"
              value="{{ etudiant.prenom|default:'' }}"
              required
            />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              value="{{ etudiant.email|default:user.email }}"
              required
            />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success px-4">
              Confirmer l'inscription
            </button>
            <a
              href="{% url 'liste_formations' %}"
              class="btn btn-secondary px-4"
              >Retour</a
            >
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
